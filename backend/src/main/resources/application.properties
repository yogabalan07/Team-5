# Spring Boot application configuration with placeholder database settings.
spring.application.name=inventory-management-backend
server.port=8080

# Replace the database name, username, and password with local MySQL settings.
spring.datasource.url=jdbc:mysql://localhost:3306/inventory_management
spring.datasource.username=your_mysql_username
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Placeholder JPA settings for development.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
